# === MSL platform ===
# Target: single VPS, HTTPS, certbot
#
# Install:
# sudo apt install nginx certbot python3-certbot-nginx
# sudo cp msl-platform.conf /etc/nginx/sites-available/msl-platform
# sudo ln -s /etc/nginx/sites-available/msl-platform /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# sudo certbot --nginx -d msl.YOURDOMAIN.de
#
# Certbot: injects ssl directives

# === Rate limits ===
# Chat: 10 req/min per IP
limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/m;

# API: 60 req/min per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

# Auth: 5 req/min per IP
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# === HTTPS redirect ===
server {
 listen 80;
 listen [::]:80;
 server_name msl.YOURDOMAIN.de;
 return 301 https://$host$request_uri;
}

# === App server ===
server {
 listen 443 ssl http2;
 listen [::]:443 ssl http2;
 server_name msl.YOURDOMAIN.de;

 # Certbot: generated paths
 # ssl_certificate /etc/letsencrypt/live/msl.YOURDOMAIN.de/fullchain.pem;
 # ssl_certificate_key /etc/letsencrypt/live/msl.YOURDOMAIN.de/privkey.pem;

 # === TLS ===
 ssl_protocols TLSv1.2 TLSv1.3;
 ssl_prefer_server_ciphers on;
 ssl_session_cache shared:SSL:10m;
 ssl_session_timeout 10m;
 add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

 # === Security headers ===
 add_header X-Frame-Options "SAMEORIGIN" always;
 add_header X-Content-Type-Options "nosniff" always;
 add_header Referrer-Policy "strict-origin-when-cross-origin" always;

 # === Logging ===
 access_log /var/log/nginx/msl-access.log;
 error_log /var/log/nginx/msl-error.log warn;

 # === Body size ===
 client_max_body_size 2m;

 # === Frontend ===
 root /var/www/msl-frontend/dist;
 index index.html;

 location / {
 try_files $uri $uri/ /index.html;

 # Static assets: immutable cache
 location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
 expires 7d;
 add_header Cache-Control "public, immutable";
 }
 }

 # === Blocked endpoints ===

 # Config write: blocked
 location = /api/admin/config {
 # Config read: allowed
 limit_except GET HEAD {
 deny all;
 }
 proxy_pass http://127.0.0.1:7090/admin/config;
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 }

 # Queue: approval polling, nutzt /api Rate-Limit
 location /api/admin/queue {
 limit_req zone=api_limit burst=20 nodelay;
 proxy_pass http://127.0.0.1:7090/admin/queue;
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 }

 # Export-all: blocked by default
 location ~* /api/.*export-all {
 return 403 '{"error":"forbidden"}';
 add_header Content-Type application/json always;
 }

 # === Backend API ===
 # === Chat API ===
 location /api/admin/chat {
 # Rate limit: 10/min, burst 3
 limit_req zone=chat_limit burst=3 delay=2;
 limit_req_status 429;

 proxy_pass http://127.0.0.1:7090/admin/chat;
 proxy_http_version 1.1;
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
 proxy_set_header X-Forwarded-Proto $scheme;

 # SSE: chat streaming
 proxy_set_header Connection '';
 proxy_buffering off;
 proxy_cache off;
 proxy_read_timeout 120s;
 }

 # === SSE stream endpoint ===
 location /api/admin/stream {
 proxy_pass http://127.0.0.1:7090/admin/stream;
 proxy_http_version 1.1;
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 proxy_set_header Connection '';
 proxy_buffering off;
 proxy_cache off;
 proxy_read_timeout 300s;
 }

 # === Other API ===
 location /api/ {
 # Rate limit: general
 limit_req zone=api_limit burst=10 nodelay;
 limit_req_status 429;

 # Prefix: /api stripped for backend
 rewrite ^/api/(.*)$ /$1 break;

 proxy_pass http://127.0.0.1:7090;
 proxy_http_version 1.1;
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
 proxy_set_header X-Forwarded-Proto $scheme;
 }

 # === Lowcoder proxy ===
 location /lowcoder/ {
 # Prefix: /lowcoder stripped
 rewrite ^/lowcoder/(.*)$ /$1 break;

 proxy_pass http://127.0.0.1:3100;
 proxy_http_version 1.1;
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
 proxy_set_header X-Forwarded-Proto $scheme;
 proxy_set_header Upgrade $http_upgrade;
 proxy_set_header Connection "upgrade";

 # Websocket support
 proxy_read_timeout 86400s;
 }

 # === Kill switch ===
 # Activate: uncomment block, reload nginx
 # Deactivate: comment block, reload nginx
 # @ToDo separate include for production toggle
 #
 # location /api/ {
 # return 503 '{"error":"service temporarily disabled","reason":"maintenance"}';
 # add_header Content-Type application/json always;
 # add_header Retry-After 3600 always;
 # }

 # === Hidden files ===
 location ~ /\. {
 deny all;
 return 404;
 }
}

# === Lowcoder direct ===
# Purpose: native admin UI
# Auth: Lowcoder only
#
# DNS: lowcoder.YOURDOMAIN.de -> same VPS IP
# SSL: sudo certbot --nginx -d lowcoder.YOURDOMAIN.de

server {
 listen 80;
 listen [::]:80;
 server_name lowcoder.YOURDOMAIN.de;
 return 301 https://$host$request_uri;
}

server {
 listen 443 ssl http2;
 listen [::]:443 ssl http2;
 server_name lowcoder.YOURDOMAIN.de;

 # Certbot: generated paths
 # ssl_certificate /etc/letsencrypt/live/lowcoder.YOURDOMAIN.de/fullchain.pem;
 # ssl_certificate_key /etc/letsencrypt/live/lowcoder.YOURDOMAIN.de/privkey.pem;

 ssl_protocols TLSv1.2 TLSv1.3;
 ssl_prefer_server_ciphers on;

 access_log /var/log/nginx/lowcoder-access.log;
 error_log /var/log/nginx/lowcoder-error.log warn;

 client_max_body_size 10m;

 location / {
 proxy_pass http://127.0.0.1:3100;
 proxy_http_version 1.1;
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
 proxy_set_header X-Forwarded-Proto $scheme;
 proxy_set_header Upgrade $http_upgrade;
 proxy_set_header Connection "upgrade";

 # Websocket support
 proxy_read_timeout 86400s;
 }

 location ~ /\. {
 deny all;
 return 404;
 }
}
